services:
  postgres:
    image: postgres:16-alpine
    container_name: meridian-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: meridian
      POSTGRES_PASSWORD: meridian
      POSTGRES_DB: meridian
    volumes:
      - meridian-pgdata:/var/lib/postgresql/data

volumes:
  meridian-pgdata:
